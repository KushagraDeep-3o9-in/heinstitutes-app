server {
    server_name nearme.3o9.in;

    # New heinstitutes-app - only requests starting with /india-heinstitutes
    # go here. Everything else (india-banks, india-blood-banks, etc.) falls
    # through untouched to the location / block below, unchanged.
    location /india-heinstitutes {
        proxy_pass http://localhost:3019;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}

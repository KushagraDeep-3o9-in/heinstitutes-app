# --- Upstreams -------------------------------------------------------------
# Existing/legacy app that currently serves the whole nearme.3o9.in site
upstream nearme_legacy {
    server 127.0.0.1:3004;
    keepalive 32;
}

# New heinstitutes-app (this project) - run it on its own port, e.g. via PM2
upstream heinstitutes_new {
    server 127.0.0.1:3017;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name nearme.3o9.in;

    # ssl_certificate     /etc/letsencrypt/live/nearme.3o9.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nearme.3o9.in/privkey.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;
    gzip_min_length 512;

    # ------------------------------------------------------------------
    # THE CUTOVER: because heinstitutes-app reproduces the exact same
    # /india-heinstitutes/... URL scheme (encodeURI, not encodeURIComponent -
    # see utils/slug.js), every URL Google already indexed keeps resolving
    # to a 200 with no redirect hop. This block is a swap, not a redirect.
    #
    # nearme.3o9.in serves several independent sections under one domain
    # (/india-heinstitutes, /india-banks, /india-blood-banks, ...). Only
    # /india-heinstitutes is being migrated today - nginx location blocks
    # match on path prefix, so ONLY requests starting with /india-heinstitutes
    # go to the new app; /india-banks and /india-blood-banks fall through
    # untouched to the location / block below and keep hitting the legacy app.
    #
    # When you're ready to migrate another section the same way, copy this
    # block, change the path prefix and the upstream, e.g.:
    #   location /india-banks { proxy_pass http://banks_new; ... }
    # ------------------------------------------------------------------
    location /india-heinstitutes {
        proxy_pass http://heinstitutes_new;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets for the new app served straight from nginx once you've
    # confirmed the swap is stable (optional perf win, skip at first)
    # location /india-heinstitutes/css/ {
    #     alias /var/www/heinstitutes-app/public/css/;
    #     expires 7d;
    #     add_header Cache-Control "public";
    # }

    # ------------------------------------------------------------------
    # SAFETY NET: if you ever DO need to change the URL structure later
    # (e.g. dropping the "(Id: ...)" suffix), add explicit 301s here BEFORE
    # they go live, one rule per changed pattern - never let a structural
    # change 404 silently, it costs you the indexed rankings.
    # Example (not needed today):
    # rewrite ^/india-heinstitutes/(.*)/\(Id:\s*([A-Za-z0-9-]+)\)$ /india-heinstitutes/institute/$2 permanent;
    # ------------------------------------------------------------------

    # Everything else on the domain - /india-banks, /india-blood-banks, the
    # yellow-pages directory, and any other legacy subpath - still goes to
    # the old app, completely unaffected by the block above.
    location / {
        proxy_pass http://nearme_legacy;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name nearme.3o9.in;
    return 301 https://$host$request_uri;
}
